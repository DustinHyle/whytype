name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false   # one platform failing must not cancel the others
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Build-time deps for compiling whisper.cpp with a GPU backend ---
      # Linux: Vulkan headers + glslc shader compiler + audio runtime.
      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Vulkan backend needs the loader/headers, glslc, and SPIRV/glslang
          # headers. Optional extras use '|| true' so a missing package name
          # never fails the job (the engine build falls back to CPU anyway).
          sudo apt-get install -y libportaudio2 cmake libvulkan-dev glslc spirv-tools
          sudo apt-get install -y glslang-tools spirv-headers || true

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio cmake
          # Metal ships with Xcode; no SDK install needed.

      # Windows: Vulkan SDK (headers + glslc) from LunarG, installed silently.
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -L -o vulkan-sdk.exe https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe
          ./vulkan-sdk.exe --accept-licenses --default-answer --confirm-command install
          $sdk = (Get-ChildItem 'C:\VulkanSDK' | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH

      - name: Build whisper.cpp binary (GPU backend)
        run: |
          python -m pip install --upgrade pip
          pip install cmake
          # backend auto = Vulkan on Linux/Windows (any GPU), Metal on macOS.
          # Pin --ref to a tag for reproducible release builds.
          python scripts/build_whispercpp.py --backend auto

      # Windows/Linux: build with the runner's Python (used for the installer
      # bundle's reference only — the bundle ships source + the native engine).
      - name: Install Python dependencies
        if: runner.os != 'macOS'
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # macOS: PyInstaller must use a NON-relocatable Python or the bundled app
      # crashes with "No module named '_struct'". actions/setup-python ships a
      # relocatable build, so use Homebrew's framework Python instead.
      - name: Build macOS app (Homebrew Python)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.12
          python3.12 -m venv buildenv
          source buildenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          python build.py

      - name: Build (Windows/Linux)
        if: runner.os != 'macOS'
        run: python build.py

      # One download per platform: Windows/Linux = installer bundle;
      # macOS = the self-contained .app (named without a "-standalone" suffix).
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: python scripts/package.py --platform windows

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: python scripts/package.py --platform macos --standalone-dir dist/WhyType.app --primary

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: python scripts/package.py --platform linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whytype-${{ runner.os }}
          path: dist/whytype-*.zip

  # Publish a public GitHub Release once, after all platforms build. Runs only
  # for version tags. Needs contents:write to create the release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/whytype-*.zip
          fail_on_unmatched_files: true
          body: |
            ## Why Type ${{ github.ref_name }}

            Local voice dictation — hold a shortcut, speak, and your words are typed.

            ### Download (no account needed)
            - **Windows:** `whytype-*-windows.zip` — extract, run `install.bat`
            - **Mac:** `whytype-*-macos.zip` — unzip, drag **Why Type** to Applications. First launch: if macOS says it "can't be verified," click **Done**, then **System Settings → Privacy & Security → Open Anyway**.
            - **Linux:** `whytype-*-linux.zip` — extract, run `./install.sh`

            See the [Install Guide](https://github.com/DustinHyle/whytype/blob/main/INSTALL.md) for step-by-step instructions.
